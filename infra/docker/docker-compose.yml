version: '3.9'

services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - XAI_API_KEY=${XAI_API_KEY}
      - RESULTS_DIR=/app/data/results
      - UPLOADS_DIR=/app/data/uploads
    volumes:
      # Persist session images and uploads between restarts
      - fotodesk_results:/app/data/results
      - fotodesk_uploads:/app/data/uploads
    restart: unless-stopped

volumes:
  fotodesk_results:
  fotodesk_uploads:

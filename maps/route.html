  #header { padding: 12px 16px; background: #2a2a2a; border-bottom: 1px solid #444; }
  #header h1 { margin: 0 0 6px; font-size: 16px; }
  #header .stats { font-size: 12px; color: #aaa; }
  .controls { padding: 10px 16px; background: #2a2a2a; border-bottom: 1px solid #444; display: flex; gap: 8px; flex-wrap: wrap; }
  .controls button { background: #1976d2; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }

  .task:hover { background: #353535; border-color: #1976d2; }

  .task .top { display: flex; align-items: center; gap: 8px; }

  .task .meta { font-size: 12px; color: #aaa; margin: 4px 0 0 36px; }
  .task .actions { display: flex; gap: 6px; margin: 8px 0 0 36px; flex-wrap: wrap; }

  .task.done { opacity: 0.45; }
  .task.done .name { text-decoration: line-through; }
  .task.done .num { background: #4caf50; }
  .task .check {
    margin-right: auto; background: transparent; border: 2px solid #555; color: #aaa;
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .task .check:hover { border-color: #4caf50; color: #4caf50; }
  .task.done .check { background: #4caf50; border-color: #4caf50; color: white; }
  .task.current { border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,0.3); }
  .task.home { background: #ff5722; border-color: #ff5722; cursor: default; }
  .task.home .num { background: white; color: #ff5722; }
  .task.home .name { color: white; }
  #map { flex: 1; height: 100%; }
  .num-marker { background: #1976d2; color: white; border: 3px solid white; border-radius: 50%; width: 36px !important; height: 36px !important; line-height: 30px; text-align: center; font-weight: bold; font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.6); transition: transform 0.2s; }
  .num-marker.home { background: #ff5722; }
  .num-marker.no-coord { background: #9c27b0; font-size: 11px; }
  .num-marker.done { background: #4caf50; opacity: 0.6; }
  .num-marker.current { background: #ff9800; transform: scale(1.2); animation: rp-pulse 1.6s infinite; }
  @keyframes rp-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,152,0,0.6), 0 2px 6px rgba(0,0,0,0.6); }
    70%  { box-shadow: 0 0 0 16px rgba(255,152,0,0), 0 2px 6px rgba(0,0,0,0.6); }
    100% { box-shadow: 0 0 0 0 rgba(255,152,0,0), 0 2px 6px rgba(0,0,0,0.6); }
  }
  .leaflet-popup-content { font-size: 13px; min-width: 220px; direction: rtl; text-align: right; color: #222; }
  .leaflet-popup-content h3 { margin: 0 0 6px; font-size: 14px; color: #1976d2; }
  .popup-actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .popup-actions a { color: white !important; padding: 4px 8px; border-radius: 4px; font-size: 11px; text-decoration: none; }
  @media (max-width: 768px) {
    #app { display: block; position: relative; }
    #map { width: 100%; height: 100vh; }
    #sidebar {
      position: fixed; left: 0; right: 0; bottom: 0; width: 100%;
      height: 92px; max-height: 92px;
      transition: max-height 0.3s ease, height 0.3s ease;
      z-index: 1000; border-left: none; border-top: 1px solid #444;
      box-shadow: 0 -6px 20px rgba(0,0,0,0.6);

    #sidebar.expanded { height: 78vh; max-height: 78vh; }
    #sidebar-handle { display: flex; }
    #header { padding: 8px 16px 6px; cursor: pointer; }
    #header h1 { font-size: 14px; }
    .controls { padding: 8px 12px; }
    .controls button { padding: 10px 14px; font-size: 13px; }
    .task { padding: 12px 14px; }
    .task .actions a { padding: 8px 14px; font-size: 13px; }
    .task .num { min-width: 32px; height: 32px; }
    .task .name { font-size: 15px; }
    .leaflet-popup-content { min-width: 240px; }
    .leaflet-popup-content a { padding: 8px 12px !important; font-size: 13px !important; }
    .leaflet-control-layers { font-size: 14px !important; }
    .leaflet-touch .leaflet-bar a { width: 36px; height: 36px; line-height: 36px; }

  }
  #sidebar-handle { display: none; height: 28px; align-items: center; justify-content: center; background: #2a2a2a; border-bottom: 1px solid #333; cursor: pointer; }
  #sidebar-handle::before { content: ''; width: 44px; height: 5px; background: #666; border-radius: 3px; }
  #next-banner { display: none; position: fixed; top: 8px; left: 8px; right: 8px; background: rgba(34,34,34,0.95); border: 1px solid #1976d2; border-radius: 10px; padding: 10px 14px; z-index: 999; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  #next-banner .label { font-size: 11px; color: #1976d2; font-weight: 600; }
  #next-banner .name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #next-banner .num { background: #1976d2; color: white; min-width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
  #next-banner a { background: #19c0c8; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; text-decoration: none; }
</style>

<body>
<div id="app">
  <div id="next-banner">
    <div class="num" id="next-num">1</div>
    <div style="flex:1;min-width:0">
      <div class="label">היעד הבא</div>
      <div class="name" id="next-name">—</div>
    </div>
    <a id="next-waze" href="#" target="_blank">🚗 Waze</a>
  </div>
  <div id="sidebar">
    <div id="sidebar-handle"></div>
    <div id="header">
      <h1>📷 מפת צילומים — 8.5.2026</h1>
      <div class="stats">9 משימות · גרור לשינוי סדר · קליק להתמקדות</div>
      <div class="stats" id="route-stats" style="margin-top:4px;color:#ffeb3b">מחשב מסלול נסיעה...</div>
    </div>
    <div class="controls">
      <button class="secondary" id="btn-reset">↺ סדר מקורי</button>
      <button class="secondary" id="btn-copy">📋 העתק מסלול</button>
    </div>
    <ul id="task-list"></ul>
  </div>
  <div id="map"></div>
</div>

<script type="module">
// Decode data from URL hash. Поддерживает #z= (gzipped+base64-url) и #d= (raw base64-url).
function b64UrlToBytes(b64url) {
  const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
  const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
  const bin = atob(padded);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

const PAYLOAD_CACHE_KEY = 'rp_payload_v1';

async function loadFromHash() {
  if (!location.hash) return null;
  const mz = location.hash.match(/[#&]z=([^&]+)/);
  if (mz && typeof DecompressionStream !== 'undefined') {
    try {
      const bytes = b64UrlToBytes(mz[1]);
      const stream = new Response(bytes).body.pipeThrough(new DecompressionStream('gzip'));
      const text = await new Response(stream).text();
      return JSON.parse(text);
    } catch (e) { console.error('z hash decode error:', e); }
  }
  const md = location.hash.match(/[#&]d=([^&]+)/);
  if (md) {
    try {
      const bytes = b64UrlToBytes(md[1]);
      const text = new TextDecoder('utf-8').decode(bytes);
      return JSON.parse(text);
    } catch (e) { console.error('d hash decode error:', e); }
  }
  return null;
}

async function loadPayload() {
  // 1. Try URL hash (fresh data — sharing/QR/AirDrop)
  const hashData = await loadFromHash();
  if (hashData) {
    // Cache so next launch (e.g. PWA from home screen без hash) тоже работает
    try { localStorage.setItem(PAYLOAD_CACHE_KEY, JSON.stringify({ data: hashData, ts: Date.now() })); }
    catch (e) { console.warn('payload cache failed', e); }
    return hashData;
  }
  // 2. Fall back to last-known payload from localStorage (PWA launch / refresh)
  try {
    const raw = localStorage.getItem(PAYLOAD_CACHE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.data) return parsed.data;
    }
  } catch (e) { console.warn('payload cache read failed', e); }
  return null;
}

const _payload = await loadPayload();
if (!_payload) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#eee;font-family:sans-serif;text-align:center;padding:24px;direction:rtl';
  const card = document.createElement('div');
  card.style.cssText = 'max-width:420px';
  const h = document.createElement('h2'); h.style.color = '#1976d2'; h.textContent = '📷 מפת צילומים'; card.appendChild(h);
  const p1 = document.createElement('p'); p1.style.color = '#ccc'; p1.textContent = 'נדרש קישור עם נתונים. הוסף #d=... ל-URL.'; card.appendChild(p1);
  const p2 = document.createElement('p'); p2.style.color = '#888'; p2.style.fontSize = '13px'; p2.textContent = 'הנתונים מוצפנים בתוך הקישור — שמור את הסימניה שקיבלת.'; card.appendChild(p2);
  wrap.appendChild(card);
  document.body.appendChild(wrap);
  throw new Error('No payload');
}

const HOME = _payload.home || { lat: 32.5714, lng: 34.9536, name: 'בית' };
const TASKS = _payload.tasks || [];

// === Persistence (localStorage, keyed by date) ===
const TODAY = new Date().toISOString().slice(0, 10);
const STATE_KEY = 'rp_state_' + TODAY;
let savedState = {};
try { savedState = JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); } catch(e) {}
const doneSet = new Set(Array.isArray(savedState.done) ? savedState.done : []);
function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      order: order.map(t => t.id),
      done: Array.from(doneSet),
      ts: Date.now()
    }));
  } catch(e) { console.warn('saveState failed', e); }
}
function clearTodayState() {
  localStorage.removeItem(STATE_KEY);
  doneSet.clear();
}

function dist(a, b) { const dy = a.lat - b.lat, dx = a.lng - b.lng; return Math.sqrt(dy*dy + dx*dx); }
// WGS84 → ITM (Israel Transverse Mercator, EPSG:2039), линейная аппроксимация для региона ИЛ
function wgsToItm(lat, lng) {
  const x = Math.round(219529 + (lng - 35.2045) * 94400);
  const y = Math.round(626907 + (lat - 31.7344) * 110540);
  return { x, y };
}
function govmapUrl(lat, lng, z = 8) {
  const { x, y } = wgsToItm(lat, lng);
  return `https://www.govmap.gov.il/?c=${x},${y}&z=${z}`;
}
function wazeUrl(t) {
  const q = t.settlement ? '&q=' + encodeURIComponent(t.settlement) : '';
  return `https://waze.com/ul?ll=${t.lat},${t.lng}${q}&navigate=yes`;
}
function defaultOrder() {
  // Сначала к самой дальней, потом по убыванию — возвращаемся постепенно ближе к дому
  return [...TASKS].sort((a, b) => dist(HOME, b) - dist(HOME, a));
}

function restoreOrder() {
  // Восстановить порядок из localStorage если есть, иначе defaultOrder
  if (Array.isArray(savedState.order) && savedState.order.length === TASKS.length) {
    const restored = savedState.order.map(id => TASKS.find(t => t.id === id)).filter(Boolean);
    if (restored.length === TASKS.length) return restored;
  }
  return defaultOrder();
}

let order = restoreOrder();

const googleHybrid = L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&hl=iw', { attribution: '© Google', subdomains: ['0','1','2','3'], maxZoom: 21, maxNativeZoom: 20 });
const googleSat = L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: '© Google', subdomains: ['0','1','2','3'], maxZoom: 21, maxNativeZoom: 20 });
const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19, maxNativeZoom: 18 });
const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 });
const map = L.map('map', { layers: [googleHybrid], zoomControl: true });
map.setView([32.0, 35.25], 10);

L.control.layers({
  '🛰 אורתופוטו + שמות (Google)': googleHybrid,
  '🛰 אורתופוטו טהור (Google)': googleSat,
  '🛰 Esri World Imagery': esriSat,
  '🗺 רחובות (OSM)': streets
}, null, { position: 'topleft', collapsed: false }).addTo(map);

const homeIcon = L.divIcon({ className: 'num-marker home', html: '🏠', iconSize: [36, 36] });
const homeMarker = L.marker([HOME.lat, HOME.lng], { icon: homeIcon }).addTo(map);
const homePopup = document.createElement('div');
const homeTitle = document.createElement('h3');
homeTitle.textContent = HOME.name;
homePopup.appendChild(homeTitle);
const homeNote = document.createElement('div');
homeNote.textContent = 'נקודת התחלה / סיום';
homePopup.appendChild(homeNote);
homeMarker.bindPopup(homePopup);

function buildPopup(t) {
  const root = document.createElement('div');
  const h = document.createElement('h3');
  h.textContent = t.name;
  root.appendChild(h);
  [['חברה', t.company], ['איש קשר', t.contact], ['סוג', t.jobType]].forEach(([k, v]) => {
    const row = document.createElement('div');
    row.textContent = k + ': ' + v;
    root.appendChild(row);
  });
  if (t.notes) {
    const n = document.createElement('div');
    n.textContent = t.notes;
    n.style.cssText = 'background:#fff3e0;padding:4px;margin-top:4px;border-radius:4px';
    root.appendChild(n);
  }
  const acts = document.createElement('div');
  acts.className = 'popup-actions';
  function addLink(text, href, color) {
    const a = document.createElement('a');
    a.textContent = text;
    a.href = href;
    a.target = '_blank';
    a.style.background = color;
    acts.appendChild(a);
  }
  addLink('🚗 Waze', wazeUrl(t), '#19c0c8');
  addLink('🗺 Maps', `https://www.google.com/maps/dir/?api=1&destination=${t.lat},${t.lng}`, '#4285f4');
  addLink('🇮🇱 Govmap', govmapUrl(t.lat, t.lng), '#d32f2f');
  if (t.phone) addLink('📞 ' + t.phone, 'tel:' + t.phone, '#ff9800');
  if (t.drive) addLink('📂 Drive', 'https://drive.google.com/drive/folders/' + t.drive, '#4caf50');
  addLink('📋 Monday', 'https://arbel-aerial-p.monday.com/boards/18284737333/pulses/' + t.mondayId, '#6c42f5');
  root.appendChild(acts);
  return root;
}

const markers = {};
TASKS.forEach(t => {
  const cls = t.polygon ? 'num-marker no-coord' : 'num-marker';
  const icon = L.divIcon({ className: cls, html: '?', iconSize: [36, 36] });
  const m = L.marker([t.lat, t.lng], { icon }).addTo(map);
  m.bindPopup(buildPopup(t));
  markers[t.id] = m;
  if (t.polygon) {
    L.polygon(t.polygon, { color: '#9c27b0', weight: 2, fillOpacity: 0.25 }).addTo(map);
  }
});

let routeLine;
let routeReqId = 0;

function activeOrder() {
  // Только не-выполненные, в текущем порядке
  return order.filter(t => !doneSet.has(t.id));
}

function renumberMarkers() {
  const active = activeOrder();
  // Build position lookup: 1..N для активных, "✓" для выполненных
  const posOf = {};
  active.forEach((t, i) => { posOf[t.id] = String(i + 1); });
  order.forEach(t => {
    let cls = t.polygon ? 'num-marker no-coord' : 'num-marker';
    let html;
    if (doneSet.has(t.id)) { cls += ' done'; html = '✓'; }
    else if (active[0] && t.id === active[0].id) { cls += ' current'; html = posOf[t.id]; }
    else { html = posOf[t.id]; }
    markers[t.id].setIcon(L.divIcon({ className: cls, html, iconSize: [36, 36] }));
  });
}

async function drawRoute() {
  renumberMarkers();
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  const active = activeOrder();
  const waypoints = [HOME, ...active, HOME];
  const stats = document.getElementById('route-stats');

  if (active.length === 0) {
    stats.textContent = 'כל המשימות הושלמו ✓';
    stats.style.color = '#8bc34a';
    return;
  }

  // Show straight dashed lines while loading (так удобно если OSRM упадёт)
  const straightPts = waypoints.map(p => [p.lat, p.lng]);
  routeLine = L.polyline(straightPts, { color: '#ffeb3b', weight: 2, opacity: 0.4, dashArray: '4, 6' }).addTo(map);
  stats.textContent = 'מחשב מסלול נסיעה...';
  stats.style.color = '#ffeb3b';

  const reqId = ++routeReqId;
  const coords = waypoints.map(p => `${p.lng},${p.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (reqId !== routeReqId) return; // более новый запрос вытеснил
    if (data.code === 'Ok' && data.routes && data.routes[0]) {
      const r = data.routes[0];
      if (routeLine) map.removeLayer(routeLine);
      routeLine = L.geoJSON(r.geometry, { style: { color: '#ffeb3b', weight: 4, opacity: 0.9 } }).addTo(map);
      const km = (r.distance / 1000).toFixed(1);
      const h = Math.floor(r.duration / 3600);
      const m = Math.round((r.duration % 3600) / 60);
      const time = h > 0 ? `${h}שע' ${m}ד'` : `${m}ד'`;
      stats.textContent = `מסלול נסיעה: ${km} ק"מ · נסיעה ${time}`;
      stats.style.color = '#8bc34a';
    } else {
      throw new Error(data.code || 'no route');
    }
  } catch (e) {
    if (reqId !== routeReqId) return;
    stats.textContent = 'לא ניתן לחשב מסלול נסיעה (קו ישר במקום)';
    stats.style.color = '#ff9800';
  }
}

function toggleDone(taskId) {
  if (doneSet.has(taskId)) doneSet.delete(taskId);
  else doneSet.add(taskId);
  saveState();
  renderList();
  drawRoute();
  updateNextBanner();
}

function makeTaskLi(t, num, isCurrent) {
  const li = document.createElement('li');
  let cls = 'task';
  if (t.polygon) cls += ' no-coord';
  if (doneSet.has(t.id)) cls += ' done';
  else if (isCurrent) cls += ' current';
  li.className = cls;
  li.dataset.id = t.id;

  const top = document.createElement('div');
  top.className = 'top';
  const numEl = document.createElement('div');
  numEl.className = 'num';
  numEl.textContent = doneSet.has(t.id) ? '✓' : String(num);
  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = t.name;
  const checkBtn = document.createElement('button');
  checkBtn.className = 'check';
  checkBtn.textContent = doneSet.has(t.id) ? '✓' : '○';
  checkBtn.title = 'סמן כבוצע';
  checkBtn.addEventListener('click', e => { e.stopPropagation(); toggleDone(t.id); });
  top.appendChild(numEl);
  top.appendChild(nameEl);
  top.appendChild(checkBtn);
  li.appendChild(top);

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = t.company + ' · ' + t.contact;
  li.appendChild(meta);

  const acts = document.createElement('div');
  acts.className = 'actions';
  function addAction(text, href, klass) {
    const a = document.createElement('a');
    a.textContent = text;
    a.href = href;
    a.target = '_blank';
    a.className = klass;
    a.addEventListener('click', e => e.stopPropagation());
    acts.appendChild(a);
  }
  addAction('Waze', wazeUrl(t), 'waze');
  addAction('Govmap', govmapUrl(t.lat, t.lng), 'govmap');
  if (t.phone) addAction('📞', 'tel:' + t.phone, 'phone');
  if (t.drive) addAction('Drive', 'https://drive.google.com/drive/folders/' + t.drive, 'drive');
  addAction('Monday', 'https://arbel-aerial-p.monday.com/boards/18284737333/pulses/' + t.mondayId, 'monday');
  li.appendChild(acts);

  if (t.notes) {
    const n = document.createElement('div');
    n.className = 'notes';
    n.textContent = t.notes;
    li.appendChild(n);
  }

  li.addEventListener('click', e => {
    if (e.target.tagName === 'A') return;
    map.setView([t.lat, t.lng], 16);
    markers[t.id].openPopup();
  });
  return li;
}

function renderList() {
  const list = document.getElementById('task-list');
  list.replaceChildren();
  const homeLi = document.createElement('li');
  homeLi.className = 'task home';
  const homeTop = document.createElement('div');
  homeTop.className = 'top';
  const homeNum = document.createElement('div');
  homeNum.className = 'num';
  homeNum.textContent = '🏠';
  const homeName = document.createElement('div');
  homeName.className = 'name';
  homeName.textContent = HOME.name;
  homeTop.appendChild(homeNum);
  homeTop.appendChild(homeName);
  homeLi.appendChild(homeTop);
  list.appendChild(homeLi);

  // Активные сверху (с нумерацией 1..N), выполненные внизу
  const active = order.filter(t => !doneSet.has(t.id));
  const done = order.filter(t => doneSet.has(t.id));
  active.forEach((t, i) => list.appendChild(makeTaskLi(t, i + 1, i === 0)));
  done.forEach(t => list.appendChild(makeTaskLi(t, 0, false)));

  // Прогресс-индикатор
  const stats0 = document.querySelector('#header .stats');
  if (stats0) {
    const total = TASKS.length;
    const doneCount = doneSet.size;
    stats0.textContent = `✓ ${doneCount}/${total} · נותרו ${total - doneCount} · גרור לשינוי סדר`;
  }
}

function initSortable() {
  const list = document.getElementById('task-list');
  Sortable.create(list, {
    animation: 150,
    filter: '.home',
    delay: 200,             // long-press для мобильного
    delayOnTouchOnly: true,
    touchStartThreshold: 5,
    onMove: evt => evt.related.className.indexOf('home') === -1,
    onEnd: () => {
      const ids = Array.from(list.querySelectorAll('.task:not(.home)')).map(el => el.dataset.id);
      order = ids.map(id => TASKS.find(t => t.id === id)).filter(Boolean);
      saveState();
      renderList();
      drawRoute();
      updateNextBanner();
    }
  });
}

function updateNextBanner() {
  const active = order.filter(t => !doneSet.has(t.id));
  const next = active[0];
  const banner = document.getElementById('next-banner');
  if (!next) {
    document.getElementById('next-num').textContent = '✓';
    document.getElementById('next-name').textContent = 'כל המשימות הושלמו';
    document.getElementById('next-waze').style.display = 'none';
    return;
  }
  document.getElementById('next-num').textContent = '1';
  document.getElementById('next-name').textContent = next.name;
  const wz = document.getElementById('next-waze');
  wz.href = wazeUrl(next);
  wz.style.display = '';
}

// Bottom sheet toggle on mobile
const sidebar = document.getElementById('sidebar');
const handle = document.getElementById('sidebar-handle');
const headerEl = document.getElementById('header');
function toggleSheet(forceOpen) {
  const willExpand = forceOpen !== undefined ? forceOpen : !sidebar.classList.contains('expanded');
  sidebar.classList.toggle('expanded', willExpand);
  setTimeout(() => map.invalidateSize(), 320);
}
handle.addEventListener('click', () => toggleSheet());
headerEl.addEventListener('click', () => toggleSheet());
// Свайп вверх по handle
let touchStartY = null;
handle.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
handle.addEventListener('touchmove', e => {
  if (touchStartY === null) return;
  const dy = touchStartY - e.touches[0].clientY;
  if (dy > 30) { toggleSheet(true); touchStartY = null; }
  if (dy < -30) { toggleSheet(false); touchStartY = null; }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (doneSet.size > 0 && !confirm('לאפס סדר ולמחוק סימוני בוצע?')) return;
  doneSet.clear();
  order = defaultOrder();
  saveState();
  renderList();
  drawRoute();
  updateNextBanner();
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const lines = order.map((t, i) => `${i + 1}. ${t.name} — ${t.lat.toFixed(5)}, ${t.lng.toFixed(5)}`);
  const text = `מסלול 8.5.2026\nבית: ${HOME.name}\n\n${lines.join('\n')}\n\nחזרה: ${HOME.name}`;
  navigator.clipboard.writeText(text).then(() => alert('המסלול הועתק'));
});

renderList();
drawRoute();
initSortable();
updateNextBanner();
const all = [HOME, ...TASKS];
map.fitBounds(L.latLngBounds(all.map(p => [p.lat, p.lng])), { padding: [40, 40] });

// Service Worker registration (PWA / offline)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('[SW] registered', reg.scope))
      .catch(err => console.warn('[SW] register failed', err));
  });
}
</script>
</body>
</html>

    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;}

    .badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--muted);}
    .badge b{color:var(--text);}
    .btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font);transition:opacity .18s;}
    .btn:hover:not(:disabled){opacity:.82;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-success{background:var(--green);color:#07200f;}
    .btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border);text-decoration:none;display:inline-block;line-height:1;}
    .btn-sm{padding:5px 12px;font-size:12px;}
    .btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:24px;}
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
    .sec-title{font-size:16px;font-weight:600;color:var(--accent);}
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:600px;}
    th{text-align:right;padding:8px 10px;background:var(--card2);color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.03em;border-bottom:1px solid var(--border);white-space:nowrap;}
    td{padding:3px 5px;border-bottom:1px solid rgba(42,51,72,.6);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(77,142,240,.04);}
    .ei{background:transparent;border:1px solid transparent;color:var(--text);font-size:13px;font-family:var(--font);padding:5px 8px;border-radius:6px;width:100%;direction:rtl;transition:border-color .15s,background .15s;}
    .ei:hover{border-color:var(--border);background:var(--card2);}
    .ei:focus{outline:none;border-color:var(--accent);background:var(--card2);}
    select.ei{cursor:pointer;}
    input[type=number].ei{text-align:center;direction:ltr;}
    .ei::placeholder{color:var(--muted);}
    .rn{color:var(--muted);font-size:11px;text-align:center;min-width:26px;padding:0 4px;}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 7px;border-radius:5px;font-size:13px;transition:color .15s;}
    .del-btn:hover{color:var(--red);}
    .alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;line-height:1.7;}
    .alert-success{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.3);color:var(--green);}

    .progress-bar{height:4px;background:var(--border);border-radius:3px;margin-top:6px;display:none;}

// ─── DOM HELPERS ──────────────────────────────────────────────────
function mkTd(content) {
  const td = document.createElement('td');
  if(content instanceof Element) td.appendChild(content);
  else td.textContent = content;
  return td;
}

function mkRnTd(n) {
  const td = document.createElement('td');
  td.className = 'rn';
  td.textContent = n;
  return td;
}

function mkInput(val, placeholder, minWidth, onInput, type) {
  const inp = document.createElement('input');
  inp.className = 'ei';
  if(type) inp.type = type;
  inp.value = val != null ? val : '';
  inp.placeholder = placeholder || '';
  if(minWidth) inp.style.minWidth = minWidth;
  inp.addEventListener('input', onInput);
  return inp;
}

function mkSelect(pairs, selected, minWidth, onChange) {
  // pairs: [{value, label}]
  const sel = document.createElement('select');
  sel.className = 'ei';
  if(minWidth) sel.style.minWidth = minWidth;
  pairs.forEach(({value, label}) => {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = label;
    if(value === selected) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', onChange);
  return sel;
}

function mkDelBtn(onClick) {
  const btn = document.createElement('button');
  btn.className = 'del-btn';
  btn.textContent = '✕';
  btn.addEventListener('click', onClick);
  return btn;
}

function custSelectPairs() {
  const pairs = [{value:'', label:'— ללא —'}];
  CUSTOMERS.forEach(c => {
    const label = c.first + (c.last?' '+c.last:'') + (c.company?' ('+c.company+')':'');
    pairs.push({value: c.id, label});
  });
  return pairs;
}

// ─── UPDATE COUNTERS ──────────────────────────────────────────────
function updateCounters() {
  const c = CUSTOMERS.length, l = LISTINGS.length, t = c+l;
  ['b-cust','lbl-cust'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=c; });
  ['b-list','lbl-list'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=l; });
  ['b-total','bb-total'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=t; });
}

// ─── RENDER CUSTOMERS ────────────────────────────────────────────
function renderCust() {
  const tb = document.getElementById('tbody-cust');
  tb.textContent = '';
  CUSTOMERS.forEach((c, i) => {
    const tr = document.createElement('tr');
    tr.appendChild(mkRnTd(i+1));
    tr.appendChild(mkTd(mkInput(c.first,   'שם פרטי',  null,  e => { CUSTOMERS[i].first   = e.target.value; })));
    tr.appendChild(mkTd(mkInput(c.last,    'שם משפחה', null,  e => { CUSTOMERS[i].last    = e.target.value; })));
    tr.appendChild(mkTd(mkInput(c.company, 'חברה / משרד', null, e => { CUSTOMERS[i].company = e.target.value; })));
    tr.appendChild(mkTd(mkInput(c.phone,   '050-0000000', '110px', e => { CUSTOMERS[i].phone   = e.target.value; })));
    tr.appendChild(mkTd(mkInput(c.email,   'email@example.com', '160px', e => { CUSTOMERS[i].email   = e.target.value; })));
    tr.appendChild(mkTd(mkDelBtn(() => delCust(i))));
    tb.appendChild(tr);
  });
  updateCounters();
}

// ─── RENDER LISTINGS ─────────────────────────────────────────────
function renderList() {

    dateInp.style.textAlign = 'left';

    tr.appendChild(mkTd(mkSelect([
      {value:'נמסר',         label:'נמסר'},
      {value:'ממתין למסירה', label:'ממתין למסירה'},
      {value:'בעיבוד',       label:'בעיבוד'},
      {value:'בוטל',         label:'בוטל'},
    ], l.status, '112px', e => { LISTINGS[i].status = e.target.value; })));

    tr.appendChild(mkTd(mkInput(l.notes, 'הערות...', '180px', e => { LISTINGS[i].notes = e.target.value; })));
    tr.appendChild(mkTd(mkDelBtn(() => delList(i))));
    tb.appendChild(tr);
  });
  updateCounters();
}

// ─── ADD / DELETE ─────────────────────────────────────────────────
function addCust() {
  CUSTOMERS.push({id:'IMP_C_'+Date.now(),first:'',last:'',phone:'',email:'',company:''});
  renderCust(); renderList();
  setTimeout(() => document.querySelector('#tbody-cust tr:last-child input').focus(), 60);
}
function delCust(i) {
  if(!confirm('מחק לקוח זה?')) return;
  CUSTOMERS.splice(i,1); renderCust(); renderList();
}
function addList() {
  LISTINGS.push({id:'IMP_L_'+Date.now(),address:'',city:'',beds:0,area:0,customer:'',pkg:'חבילה בסיסית',paymentAmount:0,paymentStatus:'unpaid',status:'ממתין למסירה',shootDate:'',notes:''});
  renderList();
  setTimeout(() => document.querySelector('#tbody-list tr:last-child input').focus(), 60);
}
function delList(i) {
  LISTINGS.splice(i,1); renderList();
}

// ─── IMPORT ───────────────────────────────────────────────────────
async function importAll() {
  const btns = [document.getElementById('btn-top'), document.getElementById('btn-bot')];
  btns.forEach(b => { b.disabled=true; b.textContent='⏳ מייבא...'; });

  const pb = document.getElementById('progress-bar');
  const pf = document.getElementById('progress-fill');
  pb.style.display='block'; pf.style.width='0%';
  document.getElementById('alert-ok').style.display  = 'none';
  document.getElementById('alert-err').style.display = 'none';

  const total = CUSTOMERS.length + LISTINGS.length;
  let done=0, errors=[];
  const tick = () => { done++; pf.style.width=(done/total*100)+'%'; };

  const heDate = () => {
    const d=new Date(), m=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    return d.getDate()+' '+m[d.getMonth()]+', '+d.getFullYear();
  };

  for (const c of CUSTOMERS) {
    try {
      await db.collection('customers').doc(c.id).set({
        id:c.id, first:(c.first||'').trim(), last:(c.last||'').trim(),
        email:(c.email||'').trim(), phone:(c.phone||'').trim(),
        company:(c.company||'').trim(), listings:0
      });
    } catch(e) { errors.push('לקוח "'+c.first+'": '+e.message); }
    tick();
  }

  const created = heDate();
  for (const l of LISTINGS) {
    try {
      await db.collection('listings').doc(l.id).set({
        id:l.id, address:(l.address||'').trim(), city:(l.city||'').trim(),
        state:'', zip:'', beds:l.beds||0, baths:0, stories:0,
        area:l.area||0, lot:0, year:0,
        pkg:l.pkg||'חבילה בסיסית', status:l.status||'ממתין למסירה',
        customer:l.customer||'', mls:'', created,
        photos:0, desc:'', notes:(l.notes||'').trim(),
        agent:'', shootDate:(l.shootDate||'').trim(),
        paymentStatus:l.paymentStatus||'unpaid',
        paymentAmount:l.paymentAmount||0,
        deliveredPhotos: l.paymentStatus==='paid',
        deliveredVideo:false, deliveredFloorplan:false
      });
    } catch(e) { errors.push('נכס "'+l.address+'": '+e.message); }
    tick();
  }

  pf.style.width='100%';
  btns.forEach(b => b.disabled=false);

  const aok = document.getElementById('alert-ok');
  const ae  = document.getElementById('alert-err');

  if (errors.length===0) {
    btns.forEach(b => { b.textContent='✓ יובא בהצלחה!'; b.style.background='var(--green)'; b.style.color='#07200f'; });
    aok.style.display='block';
    aok.textContent = '';

    const line1 = document.createElement('span');
    line1.textContent = '✅ יובאו בהצלחה ' + CUSTOMERS.length + ' לקוחות ו-' + LISTINGS.length + ' נכסים ל-Firebase.';
    const br = document.createElement('br');
    const link = document.createElement('a');
    link.href = 'photodesk.html';
    link.textContent = '→ פתח PhotoDesk CRM';
    link.style.cssText = 'color:var(--green);font-weight:600;display:inline-block;margin-top:6px';

    aok.appendChild(line1);
    aok.appendChild(br);
    aok.appendChild(link);
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    btns.forEach(b => b.textContent='⬆ ייבא לפיירבייס');
    ae.style.display='block';
    ae.textContent = '';

    const title = document.createElement('b');
    title.textContent = '⚠️ ' + errors.length + ' שגיאות:';
    ae.appendChild(title);
    errors.forEach(err => {
      const br = document.createElement('br');
      const span = document.createElement('span');
      span.textContent = '• ' + err;
      ae.appendChild(br);
      ae.appendChild(span);
    });
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

// ─── INIT ─────────────────────────────────────────────────────────
renderCust();
renderList();
</script>

async function runImport() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  log('מתחיל ייבוא...', 'info');

  // Load existing store from Firestore
  let store = { listings:[], customers:[], packages:[], services:[], addons:[], schedule:[], settings:{} };
  try {
    const snap = await db.collection('store').doc('data').get();
    if (snap.exists) {
      const d = snap.data();
      store = { ...store, ...d };
      log(`✔ נטען store קיים: ${store.listings.length} נכסים, ${store.customers.length} לקוחות`, 'ok');
    }
  } catch(e) {
    log('⚠ לא ניתן לטעון store קיים: ' + e.message, 'err');
  }

  // Merge customers
  let addedC = 0;
  for (const c of CUSTOMERS) {
    if (!store.customers.find(x => x.id === c.id)) {
      store.customers.push(c);
      addedC++;
    }
  }
  log(`👤 לקוחות: ${addedC} חדשים נוספו (${CUSTOMERS.length - addedC} כבר קיימים)`, 'ok');

  // Merge listings
  let addedL = 0;
  for (const l of LISTINGS) {
    if (!store.listings.find(x => x.id === l.id)) {
      store.listings.push(l);
      addedL++;
    }
  }
  log(`🏠 נכסים: ${addedL} חדשים נוספו (${LISTINGS.length - addedL} כבר קיימים)`, 'ok');

  // Save to Firestore
  try {
    await db.collection('store').doc('data').set(store);
    log('✅ נשמר ב-Firestore בהצלחה!', 'ok');
    log(`סה"כ: ${store.listings.length} נכסים | ${store.customers.length} לקוחות`, 'ok');
    log('עכשיו פתח את <a href="photodesk.html" style="color:#60a5fa;">photodesk.html</a> ותראה את כל הנתונים.', 'ok');
  } catch(e) {
    log('❌ שגיאה בשמירה: ' + e.message, 'err');
  }

  btn.textContent = '✓ הסתיים';
}
